<div>
  <rop-time-table-year-list-item class="time-table-item"
  *ngFor="let tty of timeTableYearList"
  [timeTableYear]="tty"
  [routerLink]="tty.id.toString()"></rop-time-table-year-list-item>

  <div *ngIf="!timeTableYearList" class="ui active dimmer">
    <div class="ui large text loader">Daten werden geladen...</div>
  </div>

  <p *ngIf="timeTableYearList && !timeTableYearList.length">Noch keine Jahresfahrpläne angelegt</p>
</div>

<button mat-fab class="fab">
  <mat-icon>add</mat-icon>
</button>
