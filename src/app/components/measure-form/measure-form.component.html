<form class="ui form"
      [formGroup]="measureForm"
      (ngSubmit)="submitForm()">
  <mat-card>
    <mat-card-title>
      Neue Maßnahme anlegen...
    </mat-card-title>
    <mat-form-field appearance="outline" class="mat-form-field">
      <mat-label>Netz</mat-label>
      <mat-select>
        <mat-option *ngFor="let nw of networks" [value]="nw.value">{{nw.viewValue}}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Bezeichnung</mat-label>
      <input matInput placeholder="Bez. d. Maßnahme">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Zeitraum</mat-label>
      <mat-date-range-input [formGroup]="measureRange" [rangePicker]="picker">
        <input matStartDate formControlName="start" placeholder="Beginn">
        <input matEndDate formControlName="end" placeholder="Ende">
      </mat-date-range-input>
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Von ZMST</mat-label>
      <input matInput placeholder="AHI">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Bis ZMST</mat-label>
      <input matInput placeholder="AHWT">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Linie</mat-label>
      <input matInput placeholder="RB XX">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Ausfall-Kilometer</mat-label>
      <input matInput>
    </mat-form-field>
  </mat-card>
</form>
