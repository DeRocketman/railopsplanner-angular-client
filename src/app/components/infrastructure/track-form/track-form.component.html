<mat-card [formGroup]="trackFormGroup">
  <form>
    <mat-card-header>
      <mat-card-title>Neue Strecke anlegen für das {{railNetwork.name}} ({{railNetwork.name}})</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-list>
        <mat-list-item>
          <mat-label>Startbahnhof:</mat-label>
          <mat-select></mat-select>
        </mat-list-item>
      </mat-list>
    </mat-card-content>
  </form>
</mat-card>

<mat-card [formGroup]="stationFormGroup">
  <form>
    <mat-card-header>
      <mat-card-title>Neuen Haltepunkt/Bahnhof anlegen</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="fill">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>DS100</mat-label>
        <input matInput formControlName="ds100">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Typ auswählen</mat-label>
        <mat-select formControlName="ds100">
          <mat-option>Bahnhof</mat-option>
          <mat-option>Haltepunkt</mat-option>
        </mat-select>
      </mat-form-field>
    </mat-card-content>
  </form>
</mat-card>
